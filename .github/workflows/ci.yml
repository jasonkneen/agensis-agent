name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run verify
      - name: Pack release artifact
        working-directory: packages/agensis-agent
        run: |
          mkdir -p ../../dist
          npm pack --pack-destination ../../dist
      - uses: actions/upload-artifact@v4
        with:
          name: agensis-agent-package
          path: dist/*.tgz

  node-18-artifact:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: agensis-agent-package
          path: artifact
      - uses: actions/setup-node@v6
        with:
          node-version: '18'
      - name: Install and execute packed commands on Node 18
        run: |
          npm install --ignore-scripts --prefix "$RUNNER_TEMP/agensis-smoke" artifact/*.tgz
          "$RUNNER_TEMP/agensis-smoke/node_modules/.bin/agensis" --version
          "$RUNNER_TEMP/agensis-smoke/node_modules/.bin/agensis" --help
          "$RUNNER_TEMP/agensis-smoke/node_modules/.bin/agensis-agent" --version
