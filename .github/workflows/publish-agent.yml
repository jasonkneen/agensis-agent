name: Publish agent to npm

# Publishes the daemon package @agensis/agensis-agent to npm when an agent
# version tag is pushed, so remote hosts can pick up the fix with
#   npm i -g @agensis/agensis-agent@latest
# without anyone publishing from a laptop.
#
#     git tag agent-v0.1.26
#     git push origin agent-v0.1.26
#
# npm Trusted Publishing is bound to this repository and workflow filename.
# GitHub OIDC authenticates the tag build without a long-lived npm token.
# A manual run verifies and packs only; it never publishes.
on:
  push:
    tags:
      - 'agent-v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish @agensis/agensis-agent
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Use current npm CLI
        run: npm install --global npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Verify source, tests, and bundle
        run: npm run verify
      - name: Verify the tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/agent-v')
        working-directory: packages/agensis-agent
        run: |
          TAG="${GITHUB_REF_NAME#agent-v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "Tag $GITHUB_REF_NAME ($TAG) does not match package.json version $PKG" >&2
            exit 1
          fi
          echo "Publishing @agensis/agensis-agent@$PKG"

      - name: Check whether this version is already published
        id: registry
        if: startsWith(github.ref, 'refs/tags/agent-v')
        working-directory: packages/agensis-agent
        run: |
          PKG="$(node -p "require('./package.json').version")"
          if npm view "@agensis/agensis-agent@$PKG" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "@agensis/agensis-agent@$PKG is already on npm; skipping publish."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: startsWith(github.ref, 'refs/tags/agent-v') && steps.registry.outputs.published != 'true'
        working-directory: packages/agensis-agent
        run: npm publish --access public --provenance
